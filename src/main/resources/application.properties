spring.application.name=event-driven

# --- RabbitMQ ---
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Don't connect to the broker at startup; the listener starts (and connects) only on demand.
spring.rabbitmq.listener.simple.auto-startup=false

# Application-defined messaging names
app.messaging.exchange=events.exchange
app.messaging.queue=events.queue
app.messaging.routing-key=events.created

# --- H2 (in-memory) ---
spring.datasource.url=jdbc:h2:mem:eventdriven;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
