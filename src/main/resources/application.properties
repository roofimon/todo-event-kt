spring.application.name=event-driven

# --- RabbitMQ ---
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Don't connect to the broker at startup; the listener starts (and connects) only on demand.
spring.rabbitmq.listener.simple.auto-startup=false

# Application-defined messaging names
app.messaging.exchange=events.exchange
app.messaging.queue=events.queue
app.messaging.routing-key=events.created

# Repository storage: jpa (DB-backed table) or in-memory
app.task.repository=jpa
app.notification.repository=jpa

# --- Postgres, lazily connected ---
# Schema + seed are provisioned by the Postgres container (docker/postgres/init.sql), so the app
# keeps ddl-auto=none and boots with zero DB connections; it connects on the first repository call.
spring.jpa.open-in-view=false
# connectTimeout/socketTimeout (seconds) so a down/unreachable DB fails fast, not after the driver default.
spring.datasource.url=jdbc:postgresql://localhost:5432/eventdriven?connectTimeout=2&socketTimeout=10
spring.datasource.username=eventdriven
spring.datasource.password=eventdriven
spring.datasource.driver-class-name=org.postgresql.Driver

# Keep startup connection-free: no Hikari pre-connect, no Hibernate DDL or JDBC metadata access at boot.
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.initialization-fail-timeout=-1
# Report "database not ready" in ~3s instead of Hikari's 30s default.
spring.datasource.hikari.connection-timeout=3000
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
