spring.application.name=event-driven

# --- RabbitMQ ---
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Don't connect to the broker at startup; the listener starts (and connects) only on demand.
spring.rabbitmq.listener.simple.auto-startup=false

# Application-defined messaging names
app.messaging.exchange=events.exchange
app.messaging.queue=events.queue
app.messaging.routing-key=events.created

# Notification storage: h2 (JPA-backed `notifications` table) or in-memory
app.notification.repository=h2

# --- H2 (in-memory), lazily connected ---
spring.jpa.open-in-view=false
# Nothing connects at startup; the schema + seed run via H2 INIT on the first physical connection.
spring.datasource.url=jdbc:h2:mem:eventdriven;DB_CLOSE_DELAY=-1;INIT=RUNSCRIPT FROM 'classpath:db/init.sql'
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# The H2 console logs available DB URLs at startup by opening a connection; silence it to stay lazy.
logging.level.org.springframework.boot.h2console.autoconfigure.H2ConsoleAutoConfiguration=WARN

# Keep startup connection-free: no Hikari pre-connect, no Hibernate DDL or JDBC metadata access at boot.
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.initialization-fail-timeout=-1
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
