# Test profile: run on in-memory H2 (no Docker/Postgres needed). Overrides the
# Postgres datasource from the main application.properties. Keeps ddl-auto=none
# (from main); the idempotent H2 INIT script creates the schema + seeds users on
# first connection, which is safe across the contexts that share mem:eventdriven.
spring.datasource.url=jdbc:h2:mem:eventdriven;DB_CLOSE_DELAY=-1;INIT=RUNSCRIPT FROM 'classpath:db/test-init.sql'
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
